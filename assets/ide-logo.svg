<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="MoneroUSD IDE">
  <!--
    MoneroUSD IDE master mark.
    Hexagon (block / dark contract) in Monero orange.
    Inside: stylised Monero-style "M" with a code-bracket accent that
    distinguishes the IDE icon from the wallet's plain coin mark.
  -->
  <defs>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FF8833" />
      <stop offset="55%" stop-color="#FF6600" />
      <stop offset="100%" stop-color="#E65800" />
    </linearGradient>
    <linearGradient id="logo-rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFA055" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#9E3D00" stop-opacity="0.0" />
    </linearGradient>
  </defs>

  <!-- Outer hexagon, point-up, slight outer rim glow. -->
  <polygon points="32,2 60,17.5 60,46.5 32,62 4,46.5 4,17.5"
           fill="url(#logo-grad)"
           stroke="url(#logo-rim)" stroke-width="0.75" />

  <!-- Inner stroke separator for depth. -->
  <polygon points="32,7 55,20 55,44 32,57 9,44 9,20"
           fill="none"
           stroke="#000" stroke-opacity="0.18" stroke-width="0.6" />

  <!-- Stylised Monero-style "M" — 4 stems + outer V's, white. -->
  <g fill="#fff" fill-rule="evenodd">
    <!-- Outer left stem -->
    <rect x="14" y="20" width="4.5" height="24" rx="0.6" />
    <!-- Left inner stem (angled) -->
    <polygon points="20,20 24.5,20 28.5,38 24,38" />
    <!-- Right inner stem (angled) -->
    <polygon points="39.5,20 44,20 40,38 35.5,38" />
    <!-- Outer right stem -->
    <rect x="45.5" y="20" width="4.5" height="24" rx="0.6" />
    <!-- Center valley dot — IDE accent -->
    <circle cx="32" cy="38.5" r="2.4" />
  </g>

  <!-- Subtle inner highlight on top half. -->
  <polygon points="32,2 60,17.5 60,32 32,32 4,32 4,17.5"
           fill="#fff" fill-opacity="0.06" />
</svg>
