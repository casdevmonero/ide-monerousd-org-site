    <!-- Hinge highlight -->
    <path d="M22 146h156" stroke-opacity="0.4" />
  </g>
  <!-- Floating "block" hexagons -->
  <g opacity="0.55">
    <polygon points="174,40 188,48 188,64 174,72 160,64 160,48" />
    <polygon points="22,30 32,36 32,48 22,54 12,48 12,36" />
