<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" fill="none" stroke="#FF6600" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="No projects illustration">
  <!-- Empty workbench: closed laptop + a few floating dust motes. -->
